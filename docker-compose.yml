version: "3.8"

services:
  api:
    image: lrnzo349/staging-labres:latest
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  watchtower:
    image: containrrr/watchtower
    command: --interval 60 --rolling-restart
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=60
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
