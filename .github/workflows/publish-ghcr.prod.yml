name: Build, Publish, and Deploy Docker Image (Production)

on:
    push:
        branches:
            - master

env:
    REGISTRY: ghcr.io
    ORG: ctrlaltelite-devs
    IMAGE: labres-manager-server
    TAG: latest

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            # 1️⃣ Checkout repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2️⃣ Set up Docker Buildx
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # 3️⃣ Log in to GHCR
            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.GH_USERNAME }}
                  password: ${{ secrets.GH_PAT }}

            # 4️⃣ Build Docker image
            - name: Build Docker image
              run: |
                  docker build \
                    -t $REGISTRY/$ORG/$IMAGE:${TAG} \
                    -t $REGISTRY/$ORG/$IMAGE:${GITHUB_SHA} \
                    .

            # 5️⃣ Push Docker image
            - name: Push Docker image
              run: |
                  docker push $REGISTRY/$ORG/$IMAGE:${TAG}
                  docker push $REGISTRY/$ORG/$IMAGE:${GITHUB_SHA}

            # 6️⃣ Deploy to VPS via SSH
            - name: Deploy to Production VPS
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USERNAME }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      DEPLOY_DIR=~/deployments/labres-prod
                      mkdir -p "$DEPLOY_DIR"
                      cd "$DEPLOY_DIR"

                      if [ ! -d labres-manager-server ]; then
                          git clone git@github.com:CtrlAltElite-Devs/labres-manager-server.git
                      else
                          cd labres-manager-server
                          git fetch origin
                          git checkout master
                          git pull origin master
                          cd ..
                      fi

                      cd labres-manager-server

                      SHA_TAG=$(git rev-parse HEAD)

                      # Log in to GHCR on VPS
                      echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u "${{ secrets.GH_USERNAME }}" --password-stdin

                      # Pull latest production image
                      docker pull ghcr.io/ctrlaltelite-devs/labres-manager-server:latest
                      docker pull ghcr.io/ctrlaltelite-devs/labres-manager-server:${SHA_TAG}

                      # 🚀 Stop old containers before starting new ones
                      docker compose -p labres-prod -f docker-compose.yml down

                      # 🆕 Start new containers
                      docker compose -p labres-prod -f docker-compose.yml up -d