name: Build, Publish, and Deploy Docker Image (Staging)

on:
    push:
        branches:
            - staging

env:
    REGISTRY: ghcr.io
    ORG: ctrlaltelite-devs
    IMAGE: labres-manager-server
    TAG: staging

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            # 1️⃣ Checkout repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2️⃣ Set up Docker Buildx
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # 3️⃣ Log in to GHCR
            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.GH_USERNAME }}
                  password: ${{ secrets.GH_PAT }}

            # 4️⃣ Build Docker image
            - name: Build Docker image
              run: |
                  docker build \
                    -t $REGISTRY/$ORG/$IMAGE:${TAG} \
                    -t $REGISTRY/$ORG/$IMAGE:${GITHUB_SHA} \
                    .

            # 5️⃣ Push Docker image
            - name: Push Docker image
              run: |
                  docker push $REGISTRY/$ORG/$IMAGE:${TAG}
                  docker push $REGISTRY/$ORG/$IMAGE:${GITHUB_SHA}